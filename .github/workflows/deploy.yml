name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx astro check

      - name: Build site
        run: npm run build
        env:
          PUBLIC_BUILD_SHA: ${{ github.sha }}
          PUBLIC_BUILD_DATE: ${{ github.event.head_commit.timestamp }}

      - name: Upload dist for validation
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  validate:
    name: Validate
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install serve
        run: npm install -g serve

      - name: Smoke test — all pages return 200
        run: |
          serve dist/ -p 4321 &
          sleep 3

          PAGES=(
            "/"
            "/events/"
            "/history/"
            "/conductor/"
            "/media/"
            "/membership/"
            "/friends/"
            "/contact/"
            "/leden/"
          )

          FAILED=0
          for path in "${PAGES[@]}"; do
            status=$(curl -sL -o /dev/null -w "%{http_code}" "http://localhost:4321${path}")
            if [ "$status" = "200" ]; then
              echo "✓ ${path} → ${status}"
            else
              echo "✗ ${path} → ${status}"
              FAILED=1
            fi
          done

          if [ $FAILED -ne 0 ]; then
            echo "One or more pages failed — deploy blocked."
            exit 1
          fi

      - name: Check no broken internal asset refs
        run: |
          # Warn if any HTML references /BaarnsMannenKoor/ (old base path)
          if grep -r '/BaarnsMannenKoor/' dist/ --include="*.html" -l; then
            echo "ERROR: old base path /BaarnsMannenKoor/ found in output — check astro.config.mjs"
            exit 1
          fi
          echo "✓ No stale base path references found"

  deploy:
    name: Deploy
    needs: [build, validate]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
